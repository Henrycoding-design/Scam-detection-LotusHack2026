<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ScamShield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <p class="eyebrow">ScamShield</p>
    <h1>Real-time page scanning is active.</h1>
    <p class="body-copy">
      Step 1 is wired up: every page load is scanned, dynamic DOM changes are watched,
      and risky links can be intercepted before navigation.
    </p>
    <dl class="status-list">
      <div>
        <dt>Status</dt>
        <dd>Monitoring the current page</dd>
      </div>
      <div>
        <dt>Mode</dt>
        <dd>Mock scoring enabled</dd>
      </div>
    </dl>
  </main>
</body>
</html>
