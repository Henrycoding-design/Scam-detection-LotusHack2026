<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScamShield</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e5e7eb;
      }

      #app {
        min-height: 100vh;
        padding: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 18px;
      }

      .logo {
        width: 28px;
        height: 28px;
        border-radius: 6px;
      }

      .brand {
        color: #a78bfa;
        font-weight: 800;
        font-size: 16px;
      }

      .page-title {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
        color: #f8fafc;
      }

      .card {
        background: #111827;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 14px;
        border: 1px solid #1f2937;
      }

      .score {
        font-size: 30px;
        font-weight: 800;
      }

      .section-title {
        margin: 0 0 12px;
        font-size: 15px;
        font-weight: 800;
        color: #f8fafc;
      }

      .subsection-title {
        margin: 0 0 8px;
        font-size: 13px;
        font-weight: 800;
        color: #cbd5e1;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .muted {
        color: #94a3b8;
        font-size: 12px;
      }

      .bar {
        height: 8px;
        background: #1f2937;
        border-radius: 999px;
        overflow: hidden;
        margin-top: 12px;
      }

      .bar-fill {
        height: 100%;
        border-radius: 999px;
        transition: width 0.4s ease;
      }

      .reason {
        background: #111827;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 8px;
        font-size: 13px;
        color: #d1d5db;
      }

      .reason-expandable {
        background: #111827;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .reason-expandable:hover {
        background: #1a2332;
      }
      .reason-header {
        font-size: 13px;
        color: #d1d5db;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .reason-header::after {
        content: "▸";
        font-size: 14px;
        font-weight: 800;
        color: #64748b;
        transition: transform 0.2s;
        flex-shrink: 0;
        margin-left: auto;
      }
      .reason-expandable.expanded .reason-header::after {
        transform: rotate(90deg);
      }
      .reason-detail {
        font-size: 12px;
        color: #9ca3af;
        line-height: 1.5;
        margin-top: 0;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease, margin-top 0.3s ease;
      }
      .reason-expandable.expanded .reason-detail {
        max-height: 500px;
        margin-top: 8px;
      }

      .pill {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .loading {
        color: #fbbf24;
      }

      .empty {
        text-align: center;
        color: #64748b;
        margin-top: 48px;
        font-size: 13px;
      }

      .overview {
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.92));
      }

      .overview-highlight {
        margin-top: 8px;
        border-radius: 12px;
        padding: 14px;
        background: rgba(148, 163, 184, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.14);
      }

      .overview-headline {
        margin: 0 0 8px;
        font-size: 16px;
        font-weight: 800;
        color: #f8fafc;
      }

      .analysis-body {
        font-size: 13px;
        color: #d1d5db;
        line-height: 1.6;
      }

      .action-card {
        border: 1px solid rgba(251, 191, 36, 0.18);
        background: rgba(120, 53, 15, 0.18);
      }

      .action-card .reason-header {
        font-weight: 700;
        color: #fde68a;
      }

      .action-card .reason-detail {
        color: #f3f4f6;
      }

      .action-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .formatted strong {
        color: #f8fafc;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./sidebar.js"></script>
  </body>
  </html>
